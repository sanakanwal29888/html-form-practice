<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <title>✨ Complete HTML Form | All Input Types with Modern Design</title>
</head>
<body>
    <div class="form-container">
    <div class="form-header">
    <h1>📋 All HTML5 Input Types
    <span>Complete Form</span>
    </h1>
    <p>Every standard input + select, textarea, datalist — modern, responsive design</p>
    </div>
    </div>

<form id="masterForm" action="#" method="post">
<!-- Section 1: Basic text & user info -->
<fieldset>
<legend>📝 Personal information</legend>
<div class="form-grid">

<div class="form-group">
<label>🔤Full Name</label>
<input type="text" name="fullname" placeholder="e.g. Sana Kanwal" required>
</div>

<div class="form-group">
<label>🔒 Password</label>
<input type="password" name="password" placeholder="At least 6 characters">
</div>

<div class="form-group">
<label>📧 Email</label>
<input type="email" name="email" placeholder="name@example.com" required>
</div>
<div class="form-group">
<label>📞 Telephone (tel)</label>
<input type="tel" name="phone" placeholder="+92 301 9999 999">
</div>
<div class="form-group">
<label>🌐 Website (url)</label>
<input type="url" name="website" placeholder="https://example.com">
</div>
<div class="form-group">
<label>🔍 Search</label>
<input type="search" name="searchQuery" placeholder="Search products...">
</div>
<div class="form-group full-width">
<label>📄 Additional Notes</label>
<textarea rows="3" name="comments" placeholder="Enter your detailed feedback or message..."></textarea>
</div>
</div>
</fieldset>


   
</body>
</html>
